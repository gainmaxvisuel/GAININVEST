<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portefeuille</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    margin:0;
    background:#020617;
    color:white;
    font-family:Arial;
    padding:10px;
    padding-bottom:90px;
}

/* CARTE */
.balance{
    background:linear-gradient(135deg,#1e293b,#020617);
    padding:25px;
    border-radius:18px;
    margin-bottom:18px;
}

.id{
    font-size:13px;
    color:#94a3b8;
}

.solde{
    font-size:30px;
    font-weight:bold;
    color:#facc15;
    margin-top:8px;
}

/* ACTIONS */
.actions{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}

.box{
    width:32%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
}

.box img{
    width:45px;
    height:45px;
    border-radius:12px;
}

.box span{
    font-size:12px;
}

/* TRANSACTIONS */
.title{
    font-size:18px;
    margin:10px 0;
}

.tx{
    background:#1e293b;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    position:relative;
}

.tx-content{
    display:flex;
    gap:12px;
    align-items:center;
}

.tx-left img{
    width:45px;
    height:45px;
    border-radius:10px;
}

.tx-details{
    display:flex;
    flex-direction:column;
}

.tx-id{
    font-size:12px;
    color:#94a3b8;
}

.tx-status{
    position:absolute;
    top:10px;
    right:12px;
    font-size:12px;
    font-weight:bold;
}

.validé{color:#22c55e;}
.rejeté{color:#ef4444;}
.en_attente{color:#facc15;}

/* MENU */
.menu{
    position:fixed;
    bottom:0;
    width:100%;
    background:#020617;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    border-top:1px solid #1e293b;
}

.menu img{
    width:22px;
}

</style>
</head>

<body>

<!-- CARTE -->
<div class="balance">
    <div id="userId" class="id">ID : ---</div>
    <div id="solde" class="solde">Solde disponible : 0 XOF</div>
</div>

<!-- ACTIONS -->
<div class="actions">

    <div class="box" onclick="goRecharge()">
        <img src="btn-recharge.png">
        <span>Recharge</span>
    </div>

    <div class="box" onclick="goRetrait()">
        <img src="btn-withdraw.png">
        <span>Retrait</span>
    </div>

    <div class="box" onclick="goVIP()">
        <img src="btn-myvip.png">
        <span>VIP</span>
    </div>

</div>

<div class="title">Transactions</div>
<div id="transactions">Chargement...</div>

<!-- MENU -->
<div class="menu">
    <div onclick="goAccueil()"><img src="menu-home.png"></div>
    <div onclick="goPortefeuille()"><img src="btn-recharge.png"></div>
    <div onclick="goEquipe()"><img src="menu-team.png"></div>
    <div onclick="goProfil()"><img src="menu-profile.png"></div>
</div>

<script>

const supabaseClient = supabase.createClient(
"https://wkpwfvuuadrgumssrkgk.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndrcHdmdnV1YWRyZ3Vtc3Nya2drIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3Mjc2NTMsImV4cCI6MjA4OTMwMzY1M30.8aHo4oU2ngD74VrYyO78R8cGltVAHmxLh-MtATtscG0"
);

/* USER */
async function loadUser(){

    let { data:{user} } = await supabaseClient.auth.getUser();

    if(!user){
        window.location.href = "index.html";
        return;
    }

    let { data } = await supabaseClient
    .from("users")
    .select("user_code, solde")
    .eq("id", user.id)
    .single();

    document.getElementById("userId").innerText =
    "ID : " + (data?.user_code || "----");

    document.getElementById("solde").innerText =
    "Solde disponible : " + (data?.solde || 0) + " XOF";
}

/* TRANSACTIONS */
async function loadTransactions(){

    let { data:{user} } = await supabaseClient.auth.getUser();
    if(!user) return;

    let all = [];

    let { data:trans } = await supabaseClient
    .from("transactions")
    .select("*")
    .eq("user_id", user.id);

    trans?.forEach(t=>{
        all.push({
            type: t.type,
            montant: t.montant,
            statut: t.statut,
            created_at: t.created_at,
            code: t.reference_unique // ✅ CORRECT
        });
    });

    all.sort((a,b)=> new Date(b.created_at) - new Date(a.created_at));

    renderTransactions(all);
}

/* AFFICHAGE */
function renderTransactions(data){

    let html = "";

    data.forEach(t=>{

        let name = "Transaction";
        let icon = "balance-history.png";

        if(t.type === "recharge"){
            name = "Recharge";
            icon = "orange-money.png";
        }

        if(t.type === "retrait"){
            name = "Retrait";
            icon = "withdraw-history.png";
        }

        if(t.type === "commission"){
            name = "Commission";
            icon = "team-commission.png";
        }

        let d = new Date(t.created_at);

        html += `
        <div class="tx">

            <div class="tx-status ${t.statut}">
                ${t.statut}
            </div>

            <div class="tx-content">

                <div class="tx-left">
                    <img src="${icon}">
                </div>

                <div class="tx-details">
                    <b>${name}</b>

                    <span class="tx-id">
                        ID: ${t.code || "N/A"}
                    </span>

                    <b>${t.montant} XOF</b>

                    <span>${d.toLocaleDateString()}</span>
                    <span>${d.toLocaleTimeString()}</span>
                </div>

            </div>

        </div>`;
    });

    document.getElementById("transactions").innerHTML = html;
}

/* REALTIME */
function realtimeUpdates(){
    supabaseClient
    .channel('wallet-live')
    .on('postgres_changes',{event:'*',schema:'public',table:'transactions'},loadTransactions)
    .subscribe();
}

/* NAV */
function goAccueil(){ location.href="acceuil.html"; }
function goPortefeuille(){ location.href="portefeuille.html"; }
function goRecharge(){ location.href="recharge.html"; }
function goRetrait(){ location.href="retrait.html"; }
function goVIP(){ location.href="mes-vip.html"; }
function goEquipe(){ location.href="equipe.html"; }
function goProfil(){ location.href="profil.html"; }

window.onload = ()=>{
    loadUser();
    loadTransactions();
    realtimeUpdates();
};

</script>

</body>
</html>
