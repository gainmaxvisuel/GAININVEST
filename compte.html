<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Compte bancaire</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    margin:0;
    background:#020617;
    color:white;
    font-family:Arial;
    padding:15px;
}

.header{
    display:flex;
    align-items:center;
    margin-bottom:20px;
}

.back{
    font-size:20px;
    margin-right:10px;
    cursor:pointer;
}

#msg{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:#22c55e;
    padding:12px 20px;
    border-radius:10px;
    display:none;
}

.card{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

.btn{
    background:#22c55e;
    padding:15px;
    border-radius:12px;
    text-align:center;
    cursor:pointer;
    margin-top:10px;
}

.operateurs{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

.op{
    flex:1;
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    text-align:center;
    cursor:pointer;
    border:2px solid transparent;
}

.op img{
    width:55px;
}

.op.active{
    border:2px solid #facc15;
}

.input{
    margin-bottom:10px;
}

.input input, .code{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
}

.phone{
    display:flex;
    gap:10px;
}

.code{
    background:#1e293b;
    color:white;
}

</style>
</head>

<body>

<div id="msg"></div>

<div class="header">
    <div class="back" onclick="goBack()">←</div>
    <h3>Compte bancaire</h3>
</div>

<div id="content"></div>

<script>

const supabaseClient = supabase.createClient(
"https://wkpwfvuuadrgumssrkgk.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndrcHdmdnV1YWRyZ3Vtc3Nya2drIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3Mjc2NTMsImV4cCI6MjA4OTMwMzY1M30.8aHo4oU2ngD74VrYyO78R8cGltVAHmxLh-MtATtscG0"
);

let operateur = "";
let currentAccount = null;

/* MESSAGE */
function showMsg(text, color="#22c55e"){
    let msg = document.getElementById("msg");
    msg.innerText = text;
    msg.style.background = color;
    msg.style.display = "block";
    setTimeout(()=> msg.style.display="none",3000);
}

function goBack(){
    window.location.href="profil.html";
}

/* LOAD */
async function loadPage(){

    let { data:{user} } = await supabaseClient.auth.getUser();

    if(!user){
        window.location.href="index.html";
        return;
    }

    let { data, error } = await supabaseClient
    .from("withdrawal_accounts")
    .select("*")
    .eq("user_id", user.id)
    .maybeSingle(); // 🔥 IMPORTANT

    if(data){
        currentAccount = data;
        showAccount(data);
    }else{
        showForm();
    }
}

/* AFFICHER COMPTE */
function showAccount(acc){

    document.getElementById("content").innerHTML = `
        <div class="card">
            <b>Opérateur:</b> ${acc.operateur}<br><br>
            <b>Nom:</b> ${acc.nom}<br><br>
            <b>Numéro:</b> ${acc.numero}
        </div>

        <div class="btn" onclick="showForm()">Modifier</div>
    `;
}

/* FORM */
function showForm(){

    let numero = "";
    let code = "";

    if(currentAccount){
        // 🔥 séparation code pays / numéro
        let match = currentAccount.numero.match(/^(\+\d+)(.*)$/);
        if(match){
            code = match[1];
            numero = match[2];
        }
        operateur = currentAccount.operateur;
    }

    document.getElementById("content").innerHTML = `

        <div class="operateurs">

            <div class="op ${operateur==="Orange Money"?"active":""}" onclick="selectOp('Orange Money')">
                <img src="orange-money.png">
                <div>Orange Money</div>
            </div>

            <div class="op ${operateur==="Moov Money"?"active":""}" onclick="selectOp('Moov Money')">
                <img src="moov-money.png">
                <div>Moov Money</div>
            </div>

        </div>

        <div class="input">
            <input id="nom" value="${currentAccount?.nom || ""}" placeholder="Nom du titulaire">
        </div>

        <div class="input phone">

            <select id="country" class="code">
                <option value="">Pays</option>
                <option value="+226" ${code==="+226"?"selected":""}>🇧🇫 +226</option>
                <option value="+228" ${code==="+228"?"selected":""}>🇹🇬 +228</option>
                <option value="+229" ${code==="+229"?"selected":""}>🇧🇯 +229</option>
                <option value="+225" ${code==="+225"?"selected":""}>🇨🇮 +225</option>
                <option value="+223" ${code==="+223"?"selected":""}>🇲🇱 +223</option>
            </select>

            <input id="numero" value="${numero}" placeholder="Numéro">
        </div>

        <div class="input">
            <input id="password" type="password" placeholder="Mot de passe transaction">
        </div>

        <div class="btn" onclick="saveAccount()">Enregistrer</div>
    `;
}

/* SELECT OP */
function selectOp(op){
    operateur = op;
    document.querySelectorAll(".op").forEach(e=> e.classList.remove("active"));

    if(op==="Orange Money"){
        document.querySelectorAll(".op")[0].classList.add("active");
    }else{
        document.querySelectorAll(".op")[1].classList.add("active");
    }
}

/* SAVE */
async function saveAccount(){

    let nom = document.getElementById("nom").value.trim();
    let numero = document.getElementById("numero").value.trim();
    let country = document.getElementById("country").value;
    let password = document.getElementById("password").value;

    if(!operateur){
        showMsg("Choisis un opérateur","#ef4444");
        return;
    }

    if(!nom || !numero || !password){
        showMsg("Remplis tous les champs","#ef4444");
        return;
    }

    if(password.length < 4){
        showMsg("Mot de passe trop court","#ef4444");
        return;
    }

    if(!country){
        showMsg("Choisis un code pays","#ef4444");
        return;
    }

    let { data:{user} } = await supabaseClient.auth.getUser();

    let fullNumber = country + numero;

    let { error } = await supabaseClient
    .from("withdrawal_accounts")
    .upsert([{
        user_id:user.id,
        nom,
        numero: fullNumber,
        operateur,
        transaction_password:password
    }], { onConflict: 'user_id' });

    if(error){
        showMsg("Erreur: "+error.message,"#ef4444");
    }else{
        showMsg("Compte enregistré");
        loadPage();
    }
}

window.onload = loadPage;

</script>

</body>
</html>
